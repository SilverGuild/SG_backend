name: "CI"

on:
  pull_request:
  push:
    branches: [ main ]

# Cancel superseded runs (helps when Dependabot opens many PRs)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan_and_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      # Run tools through `bundle exec` rather than generated binstubs.
      # This avoids depending on binstub names (e.g. bundle-audit vs bundler-audit)
      # and guarantees the locked gem versions are used.
      - name: Security audit (dependencies)
        run: bundle exec bundler-audit check --update

      - name: Security scan (Brakeman)
        run: bundle exec brakeman -q -w2

      - name: Lint (RuboCop)
        run: bundle exec rubocop -f github --parallel

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ci_node_total: [4]
        ci_node_index: [0, 1, 2, 3]

    services:
      postgres:
        image: postgres:14-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rails_test
      REDIS_URL: redis://localhost:6379/0
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache VCR cassettes
        uses: actions/cache@v5
        with:
          path: spec/vcr_cassettes
          key: vcr-cassettes-${{ hashFiles('spec/vcr_cassettes/**/*.yml') }}
          restore-keys: |
            vcr-cassettes-

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Verify database connection
        run: psql "$DATABASE_URL" -c "SELECT version();"

      - name: Load test schema
        run: bin/rails db:schema:load

      # Shard the RSpec suite across matrix nodes.
      #   - `--dry-run --format json` lists every example ID without running them.
      #   - `sort` makes ordering deterministic across nodes (RSpec may randomize),
      #     so the modulo split never overlaps or drops examples.
      #   - the array + quoting protects example IDs like `[1:2:3]` from shell globbing.
      - name: Run tests
        env:
          CI_NODE_TOTAL: ${{ matrix.ci_node_total }}
          CI_NODE_INDEX: ${{ matrix.ci_node_index }}
        run: |
          mkdir -p tmp
          mapfile -t EXAMPLES < <(
            bundle exec rspec --dry-run --format json \
              | jq -r '.examples[].id' \
              | sort \
              | awk "NR % ${CI_NODE_TOTAL} == ${CI_NODE_INDEX}"
          )
          if [ "${#EXAMPLES[@]}" -eq 0 ]; then
            echo "No examples assigned to node ${CI_NODE_INDEX}; nothing to run."
            exit 0
          fi
          bundle exec rspec \
            --format documentation \
            --format RspecJunitFormatter \
            --out "tmp/rspec-results-${CI_NODE_INDEX}.xml" \
            "${EXAMPLES[@]}"

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/.resultset.json
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: rspec-results-${{ matrix.ci_node_index }}
          path: tmp/rspec-results-*.xml
          retention-days: 7