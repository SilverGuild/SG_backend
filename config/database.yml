default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost

development:
  primary:
    <<: *default
    database: silver_guild_development
    username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
    password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  cache:
    <<: *default
    database: silver_guild_development_cache
    username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
    password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
    migration_paths: db/cache_migrate

test:
  primary:
    <<: *default
    database: rails_test
    username: postgres
    password: postgres
  cache:
    <<: *default
    database: rails_test_cache
    username: postgres
    password: postgres
    migrations_paths: db/cache_migrate
  
production:
  primary:
    <<: *default
    database: silver_guild_production
    username: <%= ENV['SILVER_GUILD_DATABASE_USERNAME'] %>
    password: <%= ENV['SILVER_GUILD_DATABASE_PASSWORD'] %>
  cache:
    <<: *default
    database: silver_guild_production_cache
    username: <%= ENV['SILVER_GUILD_DATABASE_USERNAME'] %>
    password: <%= ENV['SILVER_GUILD_DATABASE_PASSWORD'] %>
    migrations_paths: db/cache_migrate