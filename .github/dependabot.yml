version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
     ruby-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
 
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  groups:
    github-actions:
      patterns:
        - "*"
