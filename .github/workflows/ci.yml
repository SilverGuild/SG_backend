name: "CI"

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan_and_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Security audit (dependencies)
        run: bundle exec bundle-audit check --update

      - name: Security scan (Brakeman)
        run: bundle exec brakeman -q -w2

      - name: Lint (RuboCop)
        run: bundle exec rubocop -f github --parallel

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rails_test
      REDIS_URL: redis://localhost:6379/0
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Cache VCR cassettes
        uses: actions/cache@v5
        with:
          path: spec/vcr_cassettes
          key: vcr-cassettes-${{ hashFiles('spec/vcr_cassettes/**/*.yml') }}
          restore-keys: |
            vcr-cassettes-

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Verify database connection
        run: psql "$DATABASE_URL" -c "SELECT version();"

      - name: Load test schema
        run: bin/rails db:schema:load

      - name: Run tests
        run: |
          mkdir -p tmp
          bundle exec rspec \
            --format documentation \
            --format RspecJunitFormatter \
            --out tmp/rspec-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rspec-results
          path: tmp/rspec-results.xml
          retention-days: 7

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
          retention-days: 7